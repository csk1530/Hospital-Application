apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-app

spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: hospital-app

  template:
    metadata: 
      labels:
        app: hospital-app

    spec:
      containers:
      - name: hospital-app
        image: chandrashekar1530/hospital-app:v1.0.0

        ports:
        - containerPorts: 8080  
